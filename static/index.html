<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Brain — Voice Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.9.1/dist/livekit-client.umd.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* Two-panel layout */
    .app {
      display: flex;
      height: 100vh;
    }

    /* Left panel: voice */
    .voice-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      border-right: 1px solid #1e1e3a;
      min-width: 0;
    }

    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #fff; }
    .subtitle { font-size: 0.9rem; color: #888; margin-bottom: 2rem; }
    #status { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; min-height: 1.2em; }

    .btn {
      display: inline-block; padding: 0.8rem 1.8rem; border: none;
      border-radius: 50px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #connectBtn {
      background: #6366f1; color: #fff;
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
    }
    #connectBtn:hover:not(:disabled) {
      background: #818cf8;
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.5);
    }

    .controls { display: none; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; }
    .controls.active { display: flex; }
    #muteBtn { background: #22c55e; color: #fff; }
    #muteBtn.muted { background: #6b7280; }
    #endBtn { background: #ef4444; color: #fff; }
    #endBtn:hover { background: #f87171; }

    .pulse-ring {
      display: none; width: 100px; height: 100px;
      border-radius: 50%; margin: 0 auto 1.5rem; position: relative;
    }
    .pulse-ring.active { display: block; }
    .pulse-ring::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: rgba(99, 102, 241, 0.15);
      animation: pulse 2s ease-in-out infinite;
    }
    .pulse-ring .icon {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center; font-size: 2rem;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.3); opacity: 0.1; }
    }

    .error { color: #ef4444; font-size: 0.85rem; margin-top: 1rem; }

    /* Transcript */
    #transcript {
      display: none; text-align: left; width: 100%; max-height: 250px;
      overflow-y: auto; border: 1px solid #2a2a4a; border-radius: 12px;
      padding: 1rem; margin-top: 1rem; background: #161630;
      font-size: 0.82rem; line-height: 1.5;
    }
    #transcript.active { display: block; }
    #transcript .entry { margin-bottom: 0.4rem; }
    #transcript .entry .role {
      font-weight: 600; font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    #transcript .entry.user .role { color: #818cf8; }
    #transcript .entry.agent .role { color: #22c55e; }
    #transcript .entry .text { color: #ccc; }

    /* Right panel: brain */
    .brain-panel {
      width: 380px;
      display: flex;
      flex-direction: column;
      background: #12122a;
      overflow: hidden;
    }

    .brain-header {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #1e1e3a;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .brain-header h2 {
      font-size: 1rem;
      color: #fff;
      font-weight: 600;
    }

    .brain-header .count {
      background: #6366f1;
      color: #fff;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
      font-weight: 600;
    }

    .brain-header .refresh-btn {
      margin-left: auto;
      background: none;
      border: 1px solid #2a2a4a;
      color: #888;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .brain-header .refresh-btn:hover { color: #fff; border-color: #6366f1; }

    .page-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
    }

    .page-item {
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      font-size: 0.85rem;
    }
    .page-item:hover {
      background: #1a1a3a;
      border-left-color: #6366f1;
    }
    .page-item.active {
      background: #1e1e40;
      border-left-color: #6366f1;
    }
    .page-item .page-category {
      font-size: 0.7rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .page-item .page-title {
      color: #ccc;
    }

    .page-viewer {
      border-top: 1px solid #1e1e3a;
      max-height: 50%;
      overflow-y: auto;
      padding: 1.2rem;
      display: none;
    }
    .page-viewer.active { display: block; }

    .page-viewer .viewer-title {
      font-size: 0.8rem;
      color: #6366f1;
      font-weight: 600;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .page-viewer .close-btn {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1rem;
    }
    .page-viewer .close-btn:hover { color: #fff; }

    .page-viewer .viewer-content {
      font-size: 0.8rem;
      line-height: 1.6;
      color: #bbb;
      white-space: pre-wrap;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .page-viewer .viewer-content h1,
    .page-viewer .viewer-content h2,
    .page-viewer .viewer-content h3 {
      color: #fff;
      margin: 0.8rem 0 0.3rem;
    }

    .empty-state {
      padding: 2rem;
      text-align: center;
      color: #555;
      font-size: 0.85rem;
    }

    .empty-state .icon { font-size: 2rem; margin-bottom: 0.5rem; }

    /* New page notification */
    .page-item.new-page {
      animation: highlightNew 2s ease-out;
    }
    @keyframes highlightNew {
      0% { background: rgba(99, 102, 241, 0.3); }
      100% { background: transparent; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .app { flex-direction: column; }
      .voice-panel { border-right: none; border-bottom: 1px solid #1e1e3a; }
      .brain-panel { width: 100%; max-height: 50vh; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Left: Voice -->
    <div class="voice-panel">
      <h1>Second Brain</h1>
      <p class="subtitle">Your AI interviewer — tell it about your life</p>

      <div id="pulseRing" class="pulse-ring">
        <div class="icon">🎙️</div>
      </div>

      <p id="status"></p>

      <button id="connectBtn" class="btn" onclick="handleConnect()">
        Start Conversation
      </button>

      <div id="controls" class="controls">
        <button id="muteBtn" class="btn" onclick="handleToggleMic()">Mute</button>
        <button id="endBtn" class="btn" onclick="handleDisconnect()">End</button>
      </div>

      <p id="error" class="error"></p>
      <div id="transcript"></div>
    </div>

    <!-- Right: Brain -->
    <div class="brain-panel">
      <div class="brain-header">
        <h2>Brain</h2>
        <span id="pageCount" class="count">0</span>
        <button class="refresh-btn" onclick="loadWikiPages()">Refresh</button>
      </div>

      <div id="pageList" class="page-list">
        <div class="empty-state">
          <div class="icon">🧠</div>
          <div>No pages yet.<br>Start a conversation to build your brain.</div>
        </div>
      </div>

      <div id="pageViewer" class="page-viewer">
        <div class="viewer-title">
          <span id="viewerTitle"></span>
          <button class="close-btn" onclick="closeViewer()">x</button>
        </div>
        <div id="viewerContent" class="viewer-content"></div>
      </div>
    </div>
  </div>

  <script>
    const { Room, RoomEvent, Track, ConnectionState } = LivekitClient;

    let room = null;
    let micEnabled = true;
    let knownPages = new Set();
    let wikiPollInterval = null;

    const statusEl = document.getElementById('status');
    const connectBtn = document.getElementById('connectBtn');
    const controls = document.getElementById('controls');
    const muteBtn = document.getElementById('muteBtn');
    const pulseRing = document.getElementById('pulseRing');
    const errorEl = document.getElementById('error');
    const transcriptEl = document.getElementById('transcript');
    const pageListEl = document.getElementById('pageList');
    const pageCountEl = document.getElementById('pageCount');
    const pageViewerEl = document.getElementById('pageViewer');
    const viewerTitleEl = document.getElementById('viewerTitle');
    const viewerContentEl = document.getElementById('viewerContent');

    function setStatus(msg) { statusEl.textContent = msg; }
    function setError(msg) { errorEl.textContent = msg; }
    function clearError() { errorEl.textContent = ''; }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // --- Simple markdown rendering ---
    function renderMarkdown(text) {
      return text
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/\[\[(.+?)\]\]/g, '<a href="#" onclick="openPage(\'$1\'); return false;" style="color:#818cf8;">$1</a>')
        .replace(/^- (.+)$/gm, '<div style="padding-left:1rem;">• $1</div>')
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
    }

    // --- Wiki panel ---
    async function loadWikiPages() {
      try {
        const resp = await fetch('/api/wiki/pages');
        const data = await resp.json();
        const pages = data.pages || [];

        pageCountEl.textContent = pages.length;

        if (pages.length === 0) {
          pageListEl.innerHTML = '<div class="empty-state"><div class="icon">🧠</div><div>No pages yet.<br>Start a conversation to build your brain.</div></div>';
          return;
        }

        pageListEl.innerHTML = '';
        pages.forEach(title => {
          const parts = title.split('/');
          const category = parts.length > 1 ? parts.slice(0, -1).join('/') : '';
          const name = parts[parts.length - 1].replace(/_/g, ' ');

          const item = document.createElement('div');
          item.className = 'page-item' + (knownPages.has(title) ? '' : ' new-page');
          item.onclick = () => openPage(title);
          item.innerHTML = `
            ${category ? `<div class="page-category">${category}</div>` : ''}
            <div class="page-title">${name}</div>
          `;
          pageListEl.appendChild(item);
        });

        knownPages = new Set(pages);
      } catch (e) {
        console.warn('Failed to load wiki pages:', e);
      }
    }

    async function openPage(title) {
      try {
        const resp = await fetch('/api/wiki/page?title=' + encodeURIComponent(title));
        const data = await resp.json();

        viewerTitleEl.textContent = title;
        viewerContentEl.innerHTML = renderMarkdown(data.content || 'Page not found.');
        pageViewerEl.classList.add('active');

        // Highlight active page
        document.querySelectorAll('.page-item').forEach(el => el.classList.remove('active'));
        const items = document.querySelectorAll('.page-item');
        items.forEach(el => {
          if (el.querySelector('.page-title')?.textContent === title.split('/').pop().replace(/_/g, ' ')) {
            el.classList.add('active');
          }
        });
      } catch (e) {
        console.warn('Failed to load page:', e);
      }
    }

    function closeViewer() {
      pageViewerEl.classList.remove('active');
      document.querySelectorAll('.page-item').forEach(el => el.classList.remove('active'));
    }

    // --- Transcript ---
    function addTranscriptEntry(role, text) {
      const entry = document.createElement('div');
      entry.className = `entry ${role}`;
      entry.innerHTML = `<span class="role">${role === 'user' ? 'You' : 'Agent'}:</span> <span class="text">${escapeHtml(text)}</span>`;
      transcriptEl.appendChild(entry);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    // --- Connection UI ---
    function showConnected() {
      connectBtn.style.display = 'none';
      controls.classList.add('active');
      pulseRing.classList.add('active');
      transcriptEl.classList.add('active');
      transcriptEl.innerHTML = '';
      // Poll for wiki updates during conversation
      wikiPollInterval = setInterval(loadWikiPages, 5000);
    }

    function showDisconnected() {
      connectBtn.style.display = 'inline-block';
      connectBtn.disabled = false;
      connectBtn.textContent = 'Start Conversation';
      controls.classList.remove('active');
      pulseRing.classList.remove('active');
      setStatus('');
      if (wikiPollInterval) {
        clearInterval(wikiPollInterval);
        wikiPollInterval = null;
      }
      // Final refresh to catch any last writes
      loadWikiPages();
    }

    // --- Voice connection ---
    async function handleConnect() {
      clearError();
      connectBtn.disabled = true;
      connectBtn.textContent = 'Connecting...';
      setStatus('Requesting token...');

      try {
        const resp = await fetch('/api/voice-token', { method: 'POST' });
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          throw new Error(data.error || `HTTP ${resp.status}`);
        }

        const { livekit_url, token } = await resp.json();
        setStatus('Connecting to voice agent...');

        room = new Room();

        room.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
          if (track.kind === Track.Kind.Audio) {
            const audioEl = track.attach();
            document.body.appendChild(audioEl);
            setStatus('Agent connected — speak now!');
          }
        });

        room.on(RoomEvent.DataReceived, (payload, participant, kind, topic) => {
          if (topic !== 'client_actions') return;
          try {
            const data = JSON.parse(new TextDecoder().decode(payload));
            if (data.type !== 'client_action') return;

            if (data.action === 'heartbeat') {
              console.log('Heartbeat from agent:', data.payload.agent_identity);
              room.localParticipant.publishData(
                new TextEncoder().encode(JSON.stringify({
                  type: 'client_action',
                  action: 'heartbeat_ack',
                  payload: { timestamp: data.payload.timestamp }
                })),
                { reliable: true, topic: 'client_actions' }
              );
              return;
            }

            if (data.action === 'send_transcript') {
              const { role, text } = data.payload;
              addTranscriptEntry(role, text);
              return;
            }

            console.log('Agent action:', data.action, data.payload);
          } catch (e) {
            console.warn('Failed to parse data channel message', e);
          }
        });

        room.on(RoomEvent.Disconnected, () => {
          showDisconnected();
          setStatus('Call ended');
        });

        await room.connect(livekit_url, token);
        await room.localParticipant.setMicrophoneEnabled(true);
        micEnabled = true;

        showConnected();
        setStatus('Connected — waiting for agent...');

      } catch (err) {
        console.error('Connection failed:', err);
        setError(err.message);
        showDisconnected();
      }
    }

    async function handleToggleMic() {
      if (!room) return;
      micEnabled = !micEnabled;
      await room.localParticipant.setMicrophoneEnabled(micEnabled);
      muteBtn.textContent = micEnabled ? 'Mute' : 'Unmute';
      muteBtn.classList.toggle('muted', !micEnabled);
    }

    async function handleDisconnect() {
      if (room) {
        await room.disconnect();
        room = null;
      }
      showDisconnected();
      setStatus('Call ended');
    }

    // Load pages on startup
    loadWikiPages();
  </script>
</body>
</html>
